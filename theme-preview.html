      flex: 1;

    #preview-frame {

      border: none;
      display: block;

      border-top: 1px solid #e5e5e5;

      max-width: 1200px;

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Fake portfolio data (matches builder.ts sample structure)
// ─────────────────────────────────────────────────────────────────────────────
const SITE_NAME    = "Alex Rivera";
const HERO_TITLE   = "Alex Rivera";
const HERO_SUBTITLE = "Brand Designer &amp; Developer crafting digital experiences with intention.";

const PROJECTS = [
  { slug: "flux-rebrand", title: "Flux Rebrand", desc: "Complete visual identity redesign for a leading fintech company.", tags: ["branding", "fintech"],  year: "2026" },
  { slug: "calm-app",     title: "Calm App",     desc: "Mobile app redesign focused on mindfulness and user wellness.",   tags: ["ui/ux", "mobile"],    year: "2025" },
  { slug: "nova-launch",  title: "Nova Launch",  desc: "Motion-driven product launch campaign with cinematic visuals.",   tags: ["motion", "product"],  year: "2025" },
];

const ALL_TAGS = ["branding", "fintech", "mobile", "motion", "product", "ui/ux"];

function generateGradient(title, dark = false) {
  let hash = 0;
  for (let i = 0; i < title.length; i++) {
    hash = title.charCodeAt(i) + ((hash << 5) - hash);
    hash = hash & hash;
  }
  const hue1 = Math.abs(hash) % 360;
  const sat1  = 60 + (Math.abs(hash >> 8)  % 20);
  const lit1  = dark ? 35 + (Math.abs(hash >> 16) % 20) : 65 + (Math.abs(hash >> 16) % 15);
  const hue2  = (hue1 + 40 + (Math.abs(hash >> 4) % 60)) % 360;
  const sat2  = 55 + (Math.abs(hash >> 12) % 25);
  const lit2  = dark ? 30 + (Math.abs(hash >> 20) % 25) : 60 + (Math.abs(hash >> 20) % 20);
  const angle = Math.abs(hash >> 2) % 360;
  return `linear-gradient(${angle}deg,hsl(${hue1},${sat1}%,${lit1}%),hsl(${hue2},${sat2}%,${lit2}%))`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Shared SVG icons (from builder.ts)
// ─────────────────────────────────────────────────────────────────────────────
const VT_GRID_ICON = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="8" height="8" rx="1"/><rect x="10" y="0" width="8" height="8" rx="1"/><rect x="0" y="10" width="8" height="8" rx="1"/><rect x="10" y="10" width="8" height="8" rx="1"/></svg>`;
const VT_LIST_ICON = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="18" height="3" rx="1"/><rect x="0" y="7" width="18" height="3" rx="1"/><rect x="0" y="14" width="18" height="3" rx="1"/></svg>`;

const VIEW_TOGGLE_HTML = `<div class="view-toggle-container">
  <button id="btn-grid" class="view-toggle-btn active" data-view="grid" title="Grid view" aria-label="Grid view">${VT_GRID_ICON}</button>
  <button id="btn-list" class="view-toggle-btn" data-view="list" title="List view" aria-label="List view">${VT_LIST_ICON}</button>
</div>`;

// mirrors renderViewToggleScript() from builder.ts
const VIEW_TOGGLE_SCRIPT = `<script>(function(){
  var KEY='vaultfolio-view-preference';
  var c=document.getElementById('projects-container');
  var bg=document.getElementById('btn-grid');
  var bl=document.getElementById('btn-list');
  if(!c||!bg||!bl)return;
  function apply(v){
    if(v==='list'){c.classList.remove('view-grid');c.classList.add('view-list');bg.classList.remove('active');bl.classList.add('active');}
    else{c.classList.remove('view-list');c.classList.add('view-grid');bg.classList.add('active');bl.classList.remove('active');}
  }
  try{apply(localStorage.getItem(KEY)==='list'?'list':'grid');}catch(e){apply('grid');}
  bg.addEventListener('click',function(){apply('grid');try{localStorage.setItem(KEY,'grid');}catch(e){}});
  bl.addEventListener('click',function(){apply('list');try{localStorage.setItem(KEY,'list');}catch(e){}});
})();<\/script>`;

// mirrors renderTagFilterScript() from builder.ts; btnClass = CSS class for filter buttons
function filterScript(btnClass, cardClass) {
  cardClass = cardClass || 'vf-filter-card';
  return `<script>document.addEventListener("DOMContentLoaded",function(){
  var filters=document.querySelectorAll(".${btnClass}");
  var cards=document.querySelectorAll(".${cardClass}");
  filters.forEach(function(btn){
    btn.addEventListener("click",function(){
      filters.forEach(function(f){f.classList.remove("active");});
      btn.classList.add("active");
      var tag=btn.getAttribute("data-filter");
      cards.forEach(function(card){
        if(tag==="all"){card.style.display="";}
        else{
          var tList=(card.getAttribute("data-tags")||"").split(" ");
          card.style.display=tList.includes(tag)?"":"none";
        }
      });
    });
  });
});<\/script>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Switcher logic
// ─────────────────────────────────────────────────────────────────────────────
const themeMap = {
  dark:   darkHTML,
  apple:  appleHTML,
  glass:  glassHTML,
  simple: simpleHTML,
};

const frame = document.getElementById("preview-frame");
const buttons = document.querySelectorAll(".switcher-btn");

function setTheme(name) {
  const fn = themeMap[name];
  if (!fn) return;
  frame.srcdoc = fn();
  buttons.forEach(b => b.classList.toggle("active", b.dataset.theme === name));
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

// Load default
setTheme("dark");
</script>

</body>
