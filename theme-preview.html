<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultFolio — Theme Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell header ── */
    .shell-header {
      border-bottom: 1px solid #e5e5e5;
      padding: 28px 40px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .shell-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .shell-logo span { color: #ff4d00; }
    .shell-subtitle {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      margin-bottom: 24px;
      line-height: 1.2;
    }
    .shell-subtitle small {
      display: block;
      font-size: 15px;
      font-weight: 400;
      color: #777;
      margin-top: 4px;
      letter-spacing: 0;
    }

    /* ── Switcher ── */
    .switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .switcher-btn {
      padding: 8px 20px;
      border-radius: 100px;
      border: 1.5px solid #d0d0d0;
      background: #ffffff;
      color: #555;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      outline: none;
    }
    .switcher-btn:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }
    .switcher-btn.active {
      background: #7C3AED;
      border-color: #7C3AED;
      color: #ffffff;
    }

    /* ── Preview ── */
    .preview-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 40px;
    }
    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }
    .preview-frame-wrap {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .preview-bar {
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preview-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .preview-dot:nth-child(1) { background: #ff5f57; }
    .preview-dot:nth-child(2) { background: #febc2e; }
    .preview-dot:nth-child(3) { background: #28c840; }
    .preview-url {
      margin-left: 8px;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 3px 12px;
      font-size: 12px;
      color: #666;
      flex: 1;
      max-width: 300px;
    }
    #preview-frame {
      width: 100%;
      height: 680px;
      border: none;
      display: block;
    }

    /* ── CTA footer ── */
    .shell-footer {
      border-top: 1px solid #e5e5e5;
      margin-top: 16px;
      padding: 48px 40px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .shell-footer h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }
    .shell-footer p {
      font-size: 15px;
      color: #666;
      margin-bottom: 24px;
    }
    .cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.15s;
    }
    .cta-btn:hover { opacity: 0.8; }
    .cta-btn-primary { background: #7C3AED; color: #fff; border: none; }
    .cta-btn-secondary { background: #fff; color: #1a1a1a; border: 1.5px solid #d0d0d0; }
    .shell-made {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
    }

    @media (max-width: 640px) {
      .shell-header, .preview-wrap, .shell-footer { padding-left: 20px; padding-right: 20px; }
      .shell-subtitle { font-size: 22px; }
      #preview-frame { height: 520px; }
    }
  </style>
</head>
<body>

<div class="shell-header">
  <div class="shell-logo">Vault<span>Folio</span></div>
  <div class="shell-subtitle">
    Choose your portfolio theme
    <small>Live preview with sample portfolio data</small>
  </div>
  <div class="switcher">
    <button class="switcher-btn active" data-theme="simple">Simple</button>
    <button class="switcher-btn" data-theme="apple">Apple</button>
    <button class="switcher-btn" data-theme="editorial">Editorial</button>
    <button class="switcher-btn" data-theme="swiss">Swiss</button>
    <button class="switcher-btn" data-theme="dark">Dark Cinematic</button>

</div>

<div class="preview-wrap">
  <div class="preview-label">Preview</div>
  <div class="preview-frame-wrap">
    <div class="preview-bar">
      <div class="preview-dot"></div>
      <div class="preview-dot"></div>
      <div class="preview-dot"></div>
      <div class="preview-url">alexrivera.github.io/portfolio</div>

    <iframe id="preview-frame" title="Theme Preview"></iframe>
  </div>
</div>

<div class="shell-footer">
  <h2>Get started with VaultFolio</h2>
  <p>Turn your Obsidian notes into a live portfolio — no coding required.</p>
  <div class="cta-buttons">
    <a href="https://github.com/thedozcompany/VaultFolio" target="_blank" class="cta-btn cta-btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      View on GitHub
    </a>
    <a href="https://github.com/thedozcompany/VaultFolio#installation" target="_blank" class="cta-btn cta-btn-secondary">
      Install Guide →
    </a>
  </div>
  <div class="shell-made">Made with Obsidian &amp; VaultFolio</div>
</div>

<script>

const HERO_TITLE = "Alex Rivera";

  { num: "02", slug: "calm-app",      title: "Calm App",      desc: "Mobile app redesign focused on mindfulness and user wellness.",   tags: ["ui/ux", "mobile"],    year: "2025", date: "November 2025", readTime: "6 min read", color: "#16213E", textLight: true  },

.vf-project-name{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,52px);font-weight:700;letter-spacing:-1.5px;line-height:1;color:#fff;transition:color 0.3s}

</nav>

// ── EDITORIAL ────────────────────────────────────────────────────────────────
function editorialHTML() {
  const ED_COLORS = ["#F5F4EF","#E8E4DC","#1A1A1A","#F0EBE0"];
  const cards = PROJECTS.map((p, i) => {
    const bg = ED_COLORS[i % ED_COLORS.length];
    const tc = bg === "#1A1A1A" ? "#FFFFFF" : "#0A0A0A";
    const isFull = i % 3 === 0;
    return `<a href="#" class="vf-card-ed${isFull ? " full" : ""}" style="text-decoration:none">
  <div class="vf-card-ed-header" style="background:${bg};color:${tc}">
    <div class="vf-card-ed-num">NO. ${p.num}</div>
    <div class="vf-card-ed-title">${p.title}</div>
    <div class="vf-card-ed-desc">${p.desc}</div>
    <div class="vf-card-ed-tags">${p.tags.join(" · ").toUpperCase()}</div>
    <div class="vf-card-ed-link" style="border-bottom:1px solid ${tc}">Read more →</div>
  </div>
</a>`;
  }).join("\n");

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${SITE_NAME}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.vf-nav-ed-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#0A0A0A}

// ─────────────────────────────────────────────────────────────────────────────
// Switcher logic
// ─────────────────────────────────────────────────────────────────────────────
const themeMap = {
  simple:     simpleHTML,
  apple:      appleHTML,
  editorial:  editorialHTML,
  swiss:      swissHTML,
  dark:       darkHTML,
};

const frame = document.getElementById("preview-frame");
const buttons = document.querySelectorAll(".switcher-btn");

function setTheme(name) {
  const fn = themeMap[name];
  if (!fn) return;
  frame.srcdoc = fn();
  buttons.forEach(b => b.classList.toggle("active", b.dataset.theme === name));
  frame.onload = function() {
    try {
      frame.contentDocument.addEventListener('click', function(e) {
        if (e.target.closest('a')) e.preventDefault();
      }, true);
    } catch(e) {}
  };
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

// Load default
setTheme("simple");
</script>
