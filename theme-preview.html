<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultFolio — Theme Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell header ── */
    .shell-header {
      border-bottom: 1px solid #e5e5e5;
      padding: 28px 40px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .shell-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .shell-logo span { color: #ff4d00; }
    .shell-subtitle {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      margin-bottom: 24px;
      line-height: 1.2;
    }
    .shell-subtitle small {
      display: block;
      font-size: 15px;
      font-weight: 400;
      color: #777;
      margin-top: 4px;
      letter-spacing: 0;
    }

    /* ── Switcher ── */
    .switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .switcher-btn {
      padding: 8px 20px;
      border-radius: 100px;
      border: 1.5px solid #d0d0d0;
      background: #ffffff;
      color: #555;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      outline: none;
    }
    .switcher-btn:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }
    .switcher-btn.active {
      background: #7C3AED;
      border-color: #7C3AED;
      color: #ffffff;
    }

    /* ── Preview ── */
    .preview-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 40px;
    }
    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }
    .preview-frame-wrap {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .preview-bar {
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preview-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .preview-dot:nth-child(1) { background: #ff5f57; }
    .preview-dot:nth-child(2) { background: #febc2e; }
    .preview-dot:nth-child(3) { background: #28c840; }
    .preview-url {
      margin-left: 8px;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 3px 12px;
      font-size: 12px;
      color: #666;
      flex: 1;
      max-width: 300px;
    }
    #preview-frame {
      width: 100%;
      height: 680px;
      border: none;
      display: block;
    }

    /* ── CTA footer ── */
    .shell-footer {
      border-top: 1px solid #e5e5e5;
      margin-top: 16px;
      padding: 48px 40px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .shell-footer h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }
    .shell-footer p {
      font-size: 15px;
      color: #666;
      margin-bottom: 24px;
    }
    .cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.15s;
    }
    .cta-btn:hover { opacity: 0.8; }
    .cta-btn-primary { background: #7C3AED; color: #fff; border: none; }
    .cta-btn-secondary { background: #fff; color: #1a1a1a; border: 1.5px solid #d0d0d0; }
    .shell-made {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
    }

    @media (max-width: 640px) {
      .shell-header, .preview-wrap, .shell-footer { padding-left: 20px; padding-right: 20px; }
      .shell-subtitle { font-size: 22px; }
      #preview-frame { height: 520px; }
    }
  </style>
</head>
<body>

<div class="shell-header">
  <div class="shell-logo">Vault<span>Folio</span></div>
  <div class="shell-subtitle">
    Choose your portfolio theme
    <small>Live preview with sample portfolio data</small>
  </div>
  <div class="switcher">
    <button class="switcher-btn" data-theme="simple">Simple</button>
    <button class="switcher-btn" data-theme="apple">Apple</button>
    <button class="switcher-btn" data-theme="glass">Glassmorphism</button>
    <button class="switcher-btn active" data-theme="dark">Dark Cinematic</button>
  </div>
</div>

<div class="preview-wrap">
  <div class="preview-label">Preview</div>
  <div class="preview-frame-wrap">
    <div class="preview-bar">
      <div class="preview-dot"></div>
      <div class="preview-dot"></div>
      <div class="preview-dot"></div>
      <div class="preview-url">alexrivera.github.io/portfolio</div>
    </div>
    <iframe id="preview-frame" title="Theme Preview" sandbox="allow-same-origin"></iframe>
  </div>
</div>

<div class="shell-footer">
  <h2>Get started with VaultFolio</h2>
  <p>Turn your Obsidian notes into a live portfolio — no coding required.</p>
  <div class="cta-buttons">
    <a href="https://github.com/thedozcompany/VaultFolio" target="_blank" class="cta-btn cta-btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      View on GitHub
    </a>
    <a href="https://github.com/thedozcompany/VaultFolio#installation" target="_blank" class="cta-btn cta-btn-secondary">
      Install Guide →
    </a>
  </div>
  <div class="shell-made">Made with Obsidian &amp; VaultFolio</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────

const SITE_NAME = "Alex Rivera";
const HERO_TITLE = "Alex Rivera";
const HERO_SUBTITLE = "Brand Designer &amp; Developer crafting digital experiences with intention.";

const PROJECTS = [
  { num: "01", slug: "flux-rebrand",  title: "Flux Rebrand",  desc: "Complete visual identity redesign for a leading fintech company.", tags: ["branding", "fintech"],  year: "2026", color: "#1A1A2E", textLight: true  },
  { num: "02", slug: "calm-app",      title: "Calm App",      desc: "Mobile app redesign focused on mindfulness and user wellness.",   tags: ["ui/ux", "mobile"],    year: "2025", color: "#16213E", textLight: true  },

// ─────────────────────────────────────────────────────────────────────────────

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0A0A0A;color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

.vf-hero-subtitle{font-size:16px;font-weight:300;color:rgba(255,255,255,0.5);line-height:1.7;max-width:480px;margin:0 auto}

.vf-project-row{display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:40px;padding:32px 20px;border-top:1px solid rgba(255,255,255,0.1);text-decoration:none;color:#fff;transition:background 0.3s;border-radius:4px;margin:0 -20px}

.vf-project-name{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,52px);font-weight:700;letter-spacing:-1.5px;line-height:1;color:#fff;transition:color 0.3s}
.vf-project-row:hover .vf-project-name{color:#FF4D00}
.vf-project-meta-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}

.vf-project-tags-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}

.vf-footer{background:#0A0A0A;border-top:1px solid rgba(255,255,255,0.1);padding:36px 60px;display:flex;align-items:center;justify-content:space-between}
.vf-footer-left{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#fff}

<body>
<nav class="vf-nav">

// ── APPLE ─────────────────────────────────────────────────────────────────────

// ── GLASSMORPHISM ─────────────────────────────────────────────────────────────
function glassHTML() {

.vf-hero-gl{padding:160px 40px 80px;text-align:center;max-width:800px;margin:0 auto}
.vf-hero-gl-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:100px;padding:4px 14px 4px 8px;font-size:12px;color:rgba(255,255,255,0.8);margin-bottom:24px}
.vf-hero-gl-badge-dot{width:6px;height:6px;border-radius:50%;background:#7C3AED;box-shadow:0 0 8px #7C3AED;flex-shrink:0}
.vf-hero-gl-title{font-size:clamp(40px,7vw,72px);font-weight:700;letter-spacing:-2px;line-height:1.05;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
.vf-hero-gl-subtitle{font-size:17px;color:rgba(255,255,255,0.5);max-width:500px;margin:0 auto 36px;line-height:1.7}
.vf-hero-gl-cta-row{display:flex;gap:12px;justify-content:center}
.vf-hero-gl-btn-primary{background:linear-gradient(135deg,#7C3AED,#5B21B6);border:none;border-radius:12px;padding:12px 28px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 0 30px rgba(124,58,237,0.4)}
.vf-hero-gl-btn-secondary{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px 28px;color:rgba(255,255,255,0.8);font-size:15px;cursor:pointer;backdrop-filter:blur(10px)}
.vf-stats-gl{display:flex;justify-content:center;gap:48px;padding:40px;border-top:1px solid rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:60px}
.vf-stat-gl{text-align:center}
.vf-stat-gl-num{font-size:32px;font-weight:700;color:#fff;display:block}
.vf-stat-gl-lbl{font-size:12px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em}
.vf-projects-gl{max-width:1200px;margin:0 auto;padding:0 40px 80px}
.vf-section-header-gl{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.vf-section-label-gl{font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.glass-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;overflow:hidden;transition:all 0.3s ease;cursor:pointer;display:flex;flex-direction:column;color:#fff}
.glass-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(124,58,237,0.3);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.glass-card-cover-placeholder{aspect-ratio:16/9;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(79,70,229,0.2))}
.glass-card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.glass-card-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:8px}
.glass-card-desc{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:14px}
.glass-card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.glass-tag{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);border-radius:100px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.7)}
.glass-card-link{color:#A78BFA;font-size:13px;margin-top:auto;padding-top:14px;display:inline-flex;align-items:center;gap:4px}
.vf-about-gl{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:60px 40px;margin:0 40px 60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.vf-about-gl-heading{font-size:36px;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:-1px}
.vf-about-gl-text{color:rgba(255,255,255,0.5);line-height:1.8;font-size:15px}
.vf-skills-gl{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
.vf-skill-gl{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 14px;color:rgba(255,255,255,0.7);font-size:13px}
.vf-footer-gl{border-top:1px solid rgba(255,255,255,0.06);padding:32px 40px;display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,0.4);font-size:13px;max-width:1200px;margin:0 auto}
.vf-footer-gl-accent{color:#FF4D00}
</style></head>

// ─────────────────────────────────────────────────────────────────────────────
// Switcher logic
// ─────────────────────────────────────────────────────────────────────────────
const themeMap = {
  dark:   darkHTML,
  apple:  appleHTML,
  glass:  glassHTML,
  simple: simpleHTML,
};

const frame = document.getElementById("preview-frame");
const buttons = document.querySelectorAll(".switcher-btn");

function setTheme(name) {
  const fn = themeMap[name];
  if (!fn) return;
  frame.srcdoc = fn();
  buttons.forEach(b => b.classList.toggle("active", b.dataset.theme === name));
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

// Load default
setTheme("dark");
</script>

</body>
